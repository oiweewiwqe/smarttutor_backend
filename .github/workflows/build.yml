name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller PyQt6 requests

      - name: Build EXE with PyInstaller
        run: |
          cd desktop
          pyinstaller --onefile --windowed --name SmartTutor --add-data "SmartTutor.png;." main.py

      - name: Delete existing 'latest' release (if any)
        run: gh release delete latest --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create GitHub Release and upload EXE
        run: >
          gh release create latest
          "desktop/dist/SmartTutor.exe"
          --title "SmartTutor Desktop — последняя версия"
          --notes "## SmartTutor для Windows

          Десктопное приложение SmartTutor — персональный ИИ-наставник для студентов.

          ### Установка
          1. Скачай `SmartTutor.exe`
          2. Запусти файл (Windows может показать предупреждение — нажми «Подробнее» → «Выполнить»)
          3. Войди в свой аккаунт

          ### Требования
          - Windows 10 / 11 (64-bit)
          - Интернет-соединение"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
